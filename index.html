<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Paw Pack">
<title>Paw Pack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FAFAF8;--surface:#FFFFFF;--surface2:#F4F2EE;
  --text:#1C1C1A;--text2:#6B6B67;--text3:#A8A8A4;
  --border:#E8E6E0;--border2:#D4D2CC;
  --accent:#C17B3F;--accent-bg:#FBF4EC;--accent-text:#8B5020;
  --green:#2D7A5A;--green-bg:#EBF7F1;--green-text:#1A5C3F;
  --blue:#2B6CB0;--blue-bg:#EBF3FB;--blue-text:#1A4A82;
  --pink:#C0476E;--pink-bg:#FCEEF3;--pink-text:#8B2A4E;
  --red:#C0392B;--red-bg:#FDEEEC;--red-text:#8B2015;
  --warn-bg:#FEF9EC;--warn-border:#F0D080;--warn-text:#8B6A10;
  --radius:14px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,0.06);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5}
.app{max-width:480px;margin:0 auto;padding:0 0 80px;min-height:100vh}

/* Header */
.header{padding:16px 16px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.header h1{font-family:'DM Serif Display',serif;font-size:24px;font-weight:400;color:var(--text)}
.header-right{display:flex;align-items:center;gap:10px}
.lang-toggle{font-size:12px;padding:4px 10px;border:1px solid var(--border2);border-radius:20px;background:transparent;cursor:pointer;color:var(--text2);font-family:'DM Sans',sans-serif}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background 0.3s;flex-shrink:0}
.sync-dot.synced{background:var(--green)}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 20px;z-index:20;max-width:480px;margin:0 auto}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 16px;border:none;background:transparent;font-family:'DM Sans',sans-serif}
.nav-item .ni{font-size:20px}
.nav-item .nl{font-size:10px;color:var(--text3)}
.nav-item.active .nl{color:var(--accent);font-weight:500}

/* Home page */
.home-pun{background:var(--accent-bg);border:1px solid var(--warn-border);border-radius:var(--radius);padding:18px;margin:14px 16px 10px;text-align:center;position:relative}
.home-pun .pun-text{font-family:'DM Serif Display',serif;font-size:18px;color:var(--accent-text);line-height:1.4}
.home-pun .pun-sub{font-size:12px;color:var(--accent);margin-top:6px}
.pun-refresh{position:absolute;top:10px;right:12px;font-size:16px;cursor:pointer;background:none;border:none;color:var(--accent)}

.home-section{padding:0 16px;margin-bottom:14px}
.home-section-title{font-size:13px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}

/* Today tasks */
.task-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:all 0.15s}
.task-item.done{opacity:0.6;background:var(--surface2)}
.task-item.done .task-label{text-decoration:line-through;color:var(--text3)}
.task-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.task-item.done .task-check{background:var(--green);border-color:var(--green);color:#fff}
.task-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.task-label{flex:1;font-size:13px;color:var(--text)}
.task-meta{font-size:11px;color:var(--text3)}
.overdue-badge{font-size:11px;padding:2px 7px;border-radius:4px;background:var(--red-bg);color:var(--red-text);flex-shrink:0}

/* Dog grid on home */
.dog-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px}
.dog-card{padding:12px 6px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;box-shadow:var(--shadow);transition:all 0.15s}
.dog-card:active{transform:scale(0.96)}
.dog-card .av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;margin:0 auto 6px}
.dog-card .dn{font-size:11px;color:var(--text2);font-weight:500}
.dog-card .ds{font-size:10px;color:var(--text3);margin-top:2px}
.dog-card[data-i="0"] .av{background:var(--accent-bg);color:var(--accent-text)}
.dog-card[data-i="1"] .av{background:var(--green-bg);color:var(--green-text)}
.dog-card[data-i="2"] .av{background:var(--blue-bg);color:var(--blue-text)}
.dog-card[data-i="3"] .av{background:var(--pink-bg);color:var(--pink-text)}

/* Dog profile */
.profile-header{display:flex;align-items:center;gap:14px;padding:16px;background:var(--surface);border-bottom:1px solid var(--border);margin-bottom:2px}
.profile-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;font-size:18px}
.profile-name{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400}
.profile-sub{font-size:13px;color:var(--text2)}
.back-btn{padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:'DM Sans',sans-serif;margin:12px 16px 0;display:inline-block}

/* Profile tabs */
.profile-tabs{display:flex;gap:4px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.profile-tabs::-webkit-scrollbar{display:none}
.ptab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:13px;color:var(--text2);white-space:nowrap;font-family:'DM Sans',sans-serif;flex-shrink:0}
.ptab.active{background:var(--text);border-color:var(--text);color:#fff;font-weight:500}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 16px 12px;box-shadow:var(--shadow)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:14px;font-weight:500;color:var(--text)}
.add-btn{font-size:12px;padding:5px 12px;border:1px solid var(--border2);border-radius:20px;background:transparent;cursor:pointer;color:var(--text2);font-family:'DM Sans',sans-serif}

/* Log items */
.log-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);position:relative}
.log-item:last-child{border-bottom:none;padding-bottom:0}
.dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.log-body{flex:1;min-width:0;padding-right:76px}
.log-label{font-size:13px;color:var(--text);font-weight:500}
.log-meta{font-size:12px;color:var(--text2);margin-top:2px}
.log-note{font-size:12px;color:var(--text3);font-style:italic;margin-top:2px}
.item-actions{position:absolute;right:0;top:8px;display:flex;gap:4px;opacity:0;transition:opacity 0.15s}
.log-item:hover .item-actions,.log-item.touched .item-actions{opacity:1}
.act{padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;color:var(--text2);font-family:'DM Sans',sans-serif}
.act.del:hover{background:var(--red-bg);color:var(--red-text);border-color:var(--red)}
.act:hover{background:var(--surface2)}
.med-active{border-left:3px solid var(--accent);padding-left:8px}
.prog-bar{height:4px;background:var(--border);border-radius:2px;margin-top:5px}
.prog-fill{height:4px;border-radius:2px;transition:width 0.4s}
.empty{font-size:13px;color:var(--text3);text-align:center;padding:20px 0}
.alert-box{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:var(--radius-sm);padding:10px 14px;margin:0 16px 8px;font-size:13px;color:var(--warn-text)}
.alert-box strong{font-weight:500}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.cal-nav button{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;cursor:pointer;font-size:13px;color:var(--text2);font-family:'DM Sans',sans-serif}
.cal-month{font-size:16px;font-weight:500;color:var(--text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 16px 12px}
.cal-day-name{text-align:center;font-size:11px;color:var(--text3);padding:4px 0;font-weight:500}
.cal-day{text-align:center;padding:8px 4px;font-size:13px;border-radius:var(--radius-sm);cursor:pointer;position:relative;min-height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.cal-day:hover{background:var(--surface2)}
.cal-day.today{background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.cal-day.selected{background:var(--text);color:#fff}
.cal-day.selected.today{background:var(--accent);color:#fff}
.cal-day.empty-day{cursor:default}
.cal-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap}
.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-detail{padding:0 16px;margin-bottom:12px}
.cal-detail-title{font-size:13px;font-weight:500;color:var(--text2);margin-bottom:8px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0}
.modal{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:20px 20px 40px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 16px}
.modal h2{font-size:17px;font-weight:500;margin-bottom:16px;color:var(--text)}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:12px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px}
.modal input,.modal select,.modal textarea{width:100%;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 12px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;appearance:none}
.modal input:focus,.modal select:focus,.modal textarea:focus{outline:none;border-color:var(--accent)}
.modal textarea{resize:vertical;min-height:70px}
.modal-footer{display:flex;gap:8px;margin-top:20px}
.btn-cancel{flex:1;padding:12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;cursor:pointer;font-size:14px;color:var(--text2);font-family:'DM Sans',sans-serif}
.btn-save{flex:2;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--text);cursor:pointer;font-size:14px;color:#fff;font-weight:500;font-family:'DM Sans',sans-serif}
.dog-pick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:6px}
.dog-pick{padding:9px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;text-align:center;font-size:13px;background:var(--surface);color:var(--text2);font-family:'DM Sans',sans-serif;transition:all 0.12s}
.dog-pick.picked{background:var(--green-bg);border-color:var(--green);color:var(--green-text);font-weight:500}
.freq-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Onboarding */
.onboard{position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;padding:32px 20px 40px;max-width:480px;margin:0 auto}
.onboard h1{font-family:'DM Serif Display',serif;font-size:30px;font-weight:400;margin-bottom:8px;color:var(--text)}
.onboard p{font-size:14px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.onboard-step{margin-bottom:24px}
.onboard-step h3{font-size:15px;font-weight:500;margin-bottom:12px;color:var(--text)}
.dog-onboard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.dog-onboard-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.dog-onboard-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500}
.dog-onboard-name{font-size:14px;font-weight:500;color:var(--text)}
.onboard-field{margin-bottom:10px}
.onboard-field label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px}
.onboard-field select,.onboard-field input{width:100%;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;appearance:none}
.btn-primary{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:var(--text);cursor:pointer;font-size:15px;color:#fff;font-weight:500;font-family:'DM Sans',sans-serif;margin-top:8px}

/* Confirm */
.confirm-box{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px 40px;width:100%;max-width:480px}
.confirm-box p{font-size:15px;color:var(--text);margin-bottom:6px;font-weight:500}
.confirm-box small{font-size:13px;color:var(--text2)}
.confirm-footer{display:flex;gap:8px;margin-top:20px}
.btn-del{flex:1;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--red);cursor:pointer;font-size:14px;color:#fff;font-weight:500;font-family:'DM Sans',sans-serif}

/* Loading */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:12px}
.loading-screen h2{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;color:var(--text)}
.loading-screen p{font-size:13px;color:var(--text3)}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(min-width:480px){
  .bottom-nav{left:50%;transform:translateX(-50%);width:480px}
  .overlay{align-items:center;padding:1rem}
  .modal,.confirm-box{border-radius:var(--radius)}
}
</style>
</head>

</div>

function t(k){return T[lang][k]||k}
function todayISO(){return new Date().toISOString().slice(0,10)}
function fmtDate(iso){
  const d=new Date(iso),now=new Date(),diff=Math.floor((now-d)/60000);
  if(diff<2)return t('justNow');
  if(diff<60)return diff+'m ago';
  if(diff<1440)return Math.floor(diff/60)+'h ago';
  if(diff<2880)return t('yesterday');
  return d.toLocaleDateString(lang==='es'?'es-GT':'en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtDs(iso){
  if(!iso)return'';
  return new Date(iso+'T12:00:00').toLocaleDateString(lang==='es'?'es-GT':'en-US',{month:'short',day:'numeric',year:'numeric'});
}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/(1000*60*60*24))}

function setSyncDot(s){
  const d=document.getElementById('sync-dot');
  if(!d)return;
  d.className='sync-dot'+(s==='synced'?' synced':s==='syncing'?' syncing':s==='error'?' error':'');
}

async function loadFromSupabase(){
  setSyncDot('syncing');
  try{
    const r=await fetch(API+'?order=ts.desc&limit=1000',{headers:{...H,'Prefer':'return=representation'}});
    if(!r.ok)throw new Error();
    S.entries=await r.json();
    localStorage.setItem('pawpack_entries',JSON.stringify(S.entries));
    setSyncDot('synced');
  }catch(e){
    const c=localStorage.getItem('pawpack_entries');
    if(c)S.entries=JSON.parse(c);
    setSyncDot('error');
  }
}
async function pushEntry(entry){
  setSyncDot('syncing');
  try{await fetch(API,{method:'POST',headers:{...H,'Prefer':'resolution=merge-duplicates'},body:JSON.stringify(entry)});setSyncDot('synced');}
  catch(e){setSyncDot('error')}
}
async function updateEntry(entry){
  setSyncDot('syncing');
  try{await fetch(API+`?id=eq.${entry.id}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify({dogs:entry.dogs,data:entry.data})});setSyncDot('synced');}
  catch(e){setSyncDot('error')}
}
async function deleteEntryDB(id){
  setSyncDot('syncing');
  try{await fetch(API+`?id=eq.${id}`,{method:'DELETE',headers:H});setSyncDot('synced');}
  catch(e){setSyncDot('error')}
}

  document.getElementById('lang-btn').textContent=lang==='en'?'ES':'EN';

function getMedStatus(e){
  if(!e.data.start_date||!e.data.duration_days)return null;
  const start=new Date(e.data.start_date+'T00:00:00');
  const dur=parseInt(e.data.duration_days);
  const end=new Date(start);end.setDate(end.getDate()+dur-1);
  const today=new Date();today.setHours(0,0,0,0);
  const elapsed=Math.min(Math.max(0,daysBetween(e.data.start_date,todayISO())),dur);
  const pct=Math.min(Math.round((elapsed/dur)*100),100);
  const daysLeft=Math.max(0,daysBetween(todayISO(),end.toISOString().slice(0,10)));
  return{active:today<=end&&today>=start,pct,daysLeft,endDate:end.toISOString().slice(0,10)};
}

function entryLabel(type,data){
  if(type==='feed')return data.amount||t('feeding');
  if(type==='med')return(data.med_name||t('medication'))+(data.dose?' · '+data.dose:'');
  if(type==='groom')return data.groom_type||t('grooming');
  if(type==='vet')return data.reason||t('vet');
}

function actionBtns(id){
  return`<div class="item-actions">
    <button class="act" onclick="openModal(null,${id})">${lang==='es'?'Editar':'Edit'}</button>
    <button class="act del" onclick="askDel(${id})">${lang==='es'?'Borrar':'Delete'}</button>
  </div>`;
}

function getDaysSinceLastGroom(dogIdx,groomType){
  const entries=S.entries.filter(e=>e.type==='groom'&&e.dogs.includes(dogIdx)&&e.data.groom_type===groomType);
  if(!entries.length)return null;
  entries.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  return daysBetween(entries[0].ts.slice(0,10),todayISO());
}

function getTaskKey(dogIdx,type,sub){return`${todayISO()}_${dogIdx}_${type}_${sub||''}`}

function getTasksDue(){
  const sc=S.schedule;
  if(!sc)return[];
  const tasks=[];
  const today=todayISO();
  DOGS.forEach((dog,di)=>{
    const dsc=sc[di];
    if(!dsc)return;
    // Meals
    const meals=parseInt(dsc.meals)||0;
    for(let m=0;m<meals;m++){
      const key=getTaskKey(di,'feed',m);
      tasks.push({key,dogIdx:di,type:'feed',label:`${dog.name} — ${t('feeding')} ${meals>1?`#${m+1}`:''}`,done:!!S.tasks[key]});
    }
    // Active meds
    S.entries.filter(e=>e.type==='med'&&e.dogs.includes(di)).forEach(e=>{
      const st=getMedStatus(e);
      if(!st||!st.active)return;
      const freq=e.data.frequency;
      const timesPerDay=freq==='2xday'?2:freq==='3xday'?3:freq==='4xday'?4:freq==='every_other'?0.5:freq==='weekly'?0:1;
      if(timesPerDay<1&&freq!=='every_other')return;
      const count=freq==='every_other'?1:Math.max(1,Math.round(timesPerDay));
      for(let m=0;m<count;m++){
        const key=getTaskKey(di,'med',e.id+'_'+m);
        tasks.push({key,dogIdx:di,type:'med',label:`${dog.name} — ${e.data.med_name||t('medication')}${count>1?' #'+(m+1):''}`,done:!!S.tasks[key]});
      }
    });
    // Grooming
    if(dsc.groomFreqDays){
      const days=parseInt(dsc.groomFreqDays);
      const last=getDaysSinceLastGroom(di,'Bath');
      const key=getTaskKey(di,'groom','bath');
      if(last===null||last>=days){
        tasks.push({key,dogIdx:di,type:'groom',label:`${dog.name} — ${t('bath')}`,done:!!S.tasks[key],overdue:last!==null?last:null});
      }
    }
    if(dsc.analFreqDays){
      const days=parseInt(dsc.analFreqDays);
      const last=getDaysSinceLastGroom(di,'Anal glands');
      const key=getTaskKey(di,'groom','anal');
      if(last===null||last>=days){
        tasks.push({key,dogIdx:di,type:'groom',label:`${dog.name} — ${t('analGlands')}`,done:!!S.tasks[key],overdue:last!==null?last:null});
      }
    }
  });
  return tasks;
}

function toggleTask(key){
  S.tasks[key]=!S.tasks[key];
  localStorage.setItem('pawpack_tasks_'+todayISO(),JSON.stringify(S.tasks));
  renderAll();

function renderLogItem(e,type,activeDog){
  if(type==='med') return renderMedItem(e,activeDog);
  const dn=e.dogs.filter(i=>i!==activeDog).map(i=>DOGS[i].name).join(', ');
  const vd=type==='vet'&&e.data.visit_date?`<div><span style="font-size:11px;padding:2px 8px;border-radius:4px;background:var(--blue-bg);color:var(--blue-text)">${fmtDs(e.data.visit_date)}</span></div>`:'';
  return`<div class="log-item">
    <div class="dot" style="background:${META[type].dot};margin-top:5px"></div>
    <div class="log-body">
      <div class="log-label">${entryLabel(type,e.data)}</div>
      ${vd}
      <div class="log-meta">${fmtDate(e.ts)}${dn?' · also: '+dn:''}</div>
      ${type==='vet'&&e.data.vet_name?`<div class="log-meta">Vet: ${e.data.vet_name}</div>`:''}
      ${e.data.notes?`<div class="log-note">${e.data.notes}</div>`:''}
    </div>
    ${actionBtns(e.id)}
  </div>`;
}

function renderMedItem(e,activeDog){
  const st=getMedStatus(e);
  const fl=freqLabel(e.data.frequency);
  const dn=e.dogs.filter(i=>i!==activeDog).map(i=>DOGS[i].name).join(', ');
  let stHtml='';
  if(st){
    const col=st.active?(st.daysLeft<=1?'var(--accent)':'var(--green)'):'#aaa';
    const stTxt=st.active?(st.daysLeft===0?t('lastDay'):`${st.daysLeft} ${t('daysLeft')} ${fmtDs(st.endDate)}`):`${t('completed')} ${fmtDs(st.endDate)}`;
    stHtml=`<div class="log-meta" style="margin-top:3px">${stTxt}</div>
    <div class="prog-bar"><div class="prog-fill" style="width:${st.pct}%;background:${col}"></div></div>`;
  }
  return`<div class="log-item${st&&st.active?' med-active':''}">
    <div class="dot" style="background:var(--accent);margin-top:5px"></div>
    <div class="log-body">
      <div class="log-label">${entryLabel('med',e.data)}</div>
      <div class="log-meta">${fl}${e.data.start_date?' · '+t('started')+' '+fmtDs(e.data.start_date):''}${dn?' · also: '+dn:''}</div>
      ${stHtml}
      ${e.data.notes?`<div class="log-note">${e.data.notes}</div>`:''}
    </div>
    ${actionBtns(e.id)}
  </div>`;
}

function freqLabel(f){
  const map={'1xday':t('oncedaily'),'2xday':t('twicedaily'),'3xday':t('3xdaily'),'4xday':t('4xdaily'),'every_other':t('everyother'),'weekly':t('weekly'),'as_needed':t('asneeded')};
  return map[f]||f||'';
}

function renderCalendar(){
  const year=S.calYear,month=S.calMonth;
  const monthName=new Date(year,month,1).toLocaleDateString(lang==='es'?'es-GT':'en-US',{month:'long',year:'numeric'});
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=todayISO();
  const dayNames=lang==='es'?['Do','Lu','Ma','Mi','Ju','Vi','Sa']:['Su','Mo','Tu','We','Th','Fr','Sa'];

  const entryDates={};
  S.entries.forEach(e=>{
    const d=e.ts.slice(0,10);
    if(!entryDates[d])entryDates[d]=[];
    entryDates[d].push(e.type);
  });

  let cells='';
  for(let i=0;i<firstDay;i++)cells+=`<div class="cal-day empty-day"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const iso=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const types=[...new Set(entryDates[iso]||[])];
    const dots=types.map(t=>`<div class="cal-dot" style="background:${META[t]?META[t].dot:'#ccc'}"></div>`).join('');
    const cls=`cal-day${iso===today?' today':''}${iso===S.calSelected?' selected':''}`;
    cells+=`<div class="${cls}" onclick="selectCalDay('${iso}')">${d}${dots?`<div class="cal-dots">${dots}</div>`:''}`;
    cells+=`</div>`;
  }

  let detail='';
  if(S.calSelected){
    const dayEntries=S.entries.filter(e=>e.ts.slice(0,10)===S.calSelected).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
    const selLabel=new Date(S.calSelected+'T12:00:00').toLocaleDateString(lang==='es'?'es-GT':'en-US',{weekday:'long',month:'long',day:'numeric'});
    detail=`<div class="cal-detail">
      <div class="cal-detail-title">${selLabel}</div>
      ${dayEntries.length?dayEntries.map(e=>{
        const dogNames=e.dogs.map(i=>DOGS[i].name).join(', ');
        return`<div class="log-item" style="padding:8px 0">
          <div class="dot" style="background:${META[e.type].dot};margin-top:5px"></div>
          <div class="log-body" style="padding-right:0">
            <div class="log-label">${entryLabel(e.type,e.data)}</div>
            <div class="log-meta">${t(META[e.type].labelKey)} · ${dogNames}</div>
            ${e.data.notes?`<div class="log-note">${e.data.notes}</div>`:''}
          </div>
        </div>`;
      }).join(''):`<div class="empty" style="padding:12px 0">${t('noEntries')}</div>`}
    </div>`;
  }

  return`
    <div class="cal-nav">
      <button onclick="calNav(-1)">‹</button>
      <span class="cal-month">${monthName}</span>
      <button onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      ${dayNames.map(n=>`<div class="cal-day-name">${n}</div>`).join('')}
      ${cells}
    </div>
    ${detail}`;
}

function calNav(dir){
  S.calMonth+=dir;
  if(S.calMonth>11){S.calMonth=0;S.calYear++;}
  if(S.calMonth<0){S.calMonth=11;S.calYear--;}
  renderAll();
}
function selectCalDay(iso){S.calSelected=S.calSelected===iso?null:iso;renderAll()}

    <div style="font-size:18px;font-weight:500;margin-bottom:16px;color:var(--text)">${t('settingsTitle')}</div>
    ${DOGS.map((dog,di)=>{
      const dsc=sc[di]||{};
      return`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
          <div style="width:32px;height:32px;border-radius:50%;background:${DOG_BG[di]};color:${DOG_TEXT[di]};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500">${dog.short}</div>
          <div style="font-size:14px;font-weight:500">${dog.name}</div>
        </div>
        <div style="margin-bottom:8px">
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px">${t('mealsPerDay')}</label>
          <select id="sc-meals-${di}" style="width:100%;font-size:13px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;appearance:none">
            ${[1,2,3,4].map(n=>`<option value="${n}"${parseInt(dsc.meals)===n?' selected':''}>${n}x ${lang==='es'?'al día':'per day'}</option>`).join('')}
          </select>
        </div>
        <div style="margin-bottom:8px">
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px">${t('bath')} — ${t('groomEvery')}</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <input id="sc-groom-n-${di}" type="number" min="1" value="${dsc.groomFreqN||''}" placeholder="e.g. 2" style="font-size:13px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif">
            <select id="sc-groom-u-${di}" style="font-size:13px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;appearance:none">
              <option value="7"${dsc.groomFreqUnit==='7'?' selected':''}>${t('nWeeks')}</option>
              <option value="30"${dsc.groomFreqUnit==='30'?' selected':''}>${t('nMonths')}</option>
              <option value="1"${dsc.groomFreqUnit==='1'?' selected':''}>${t('nDays')}</option>
            </select>
          </div>
        </div>
        <div>
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.4px">${t('analGlands')} — ${t('groomEvery')}</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <input id="sc-anal-n-${di}" type="number" min="1" value="${dsc.analFreqN||''}" placeholder="e.g. 1" style="font-size:13px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif">
            <select id="sc-anal-u-${di}" style="font-size:13px;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 10px;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;appearance:none">
              <option value="7"${dsc.analFreqUnit==='7'?' selected':''}>${t('nWeeks')}</option>
              <option value="30"${dsc.analFreqUnit==='30'?' selected':''}>${t('nMonths')}</option>
              <option value="1"${dsc.analFreqUnit==='1'?' selected':''}>${t('nDays')}</option>
            </select>
          </div>
        </div>
      </div>`;
    }).join('')}
    <button class="btn-primary" onclick="saveSettings()">${t('saveSettings')}</button>
  </div>`;
}

function saveSettings(){
  const sc={};
  DOGS.forEach((dog,di)=>{
    const meals=document.getElementById(`sc-meals-${di}`)?.value;
    const groomN=document.getElementById(`sc-groom-n-${di}`)?.value;
    const groomU=document.getElementById(`sc-groom-u-${di}`)?.value;
    const analN=document.getElementById(`sc-anal-n-${di}`)?.value;
    const analU=document.getElementById(`sc-anal-u-${di}`)?.value;
    sc[di]={
      meals:parseInt(meals)||2,
      groomFreqN:groomN,groomFreqUnit:groomU,
      groomFreqDays:groomN&&groomU?parseInt(groomN)*parseInt(groomU):null,
      analFreqN:analN,analFreqUnit:analU,
      analFreqDays:analN&&analU?parseInt(analN)*parseInt(analU):null
    };
  });
  S.schedule=sc;
  localStorage.setItem('pawpack_schedule',JSON.stringify(sc));
  showView('home');
}

function renderOnboarding(){
  const el=document.getElementById('onboard-screen');
  el.style.display='block';
  document.getElementById('app').style.display='none';
  el.innerHTML=`<div class="onboard">
    <h1>Paw Pack 🐾</h1>
    <p>${t('setupSub')}</p>
    ${DOGS.map((dog,di)=>`
      <div class="dog-onboard">
        <div class="dog-onboard-header">
          <div class="dog-onboard-av" style="background:${DOG_BG[di]};color:${DOG_TEXT[di]}">${dog.short}</div>
          <div class="dog-onboard-name">${dog.name}</div>
        </div>
        <div class="onboard-field">
          <label>${t('mealsPerDay')}</label>
          <select id="ob-meals-${di}">
            ${[1,2,3,4].map(n=>`<option value="${n}"${n===2?' selected':''}>${n}x ${lang==='es'?'al día':'per day'}</option>`).join('')}
          </select>
        </div>
        <div class="onboard-field">
          <label>${t('bath')} — ${t('groomEvery')}</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <input id="ob-groom-n-${di}" type="number" min="1" placeholder="2">
            <select id="ob-groom-u-${di}">
              <option value="7">${t('nWeeks')}</option>
              <option value="30">${t('nMonths')}</option>
              <option value="1">${t('nDays')}</option>
            </select>
          </div>
        </div>
        <div class="onboard-field">
          <label>${t('analGlands')} — ${t('groomEvery')}</label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <input id="ob-anal-n-${di}" type="number" min="1" placeholder="1">
            <select id="ob-anal-u-${di}">
              <option value="7">${t('nWeeks')}</option>
              <option value="30">${t('nMonths')}</option>
              <option value="1">${t('nDays')}</option>
            </select>
          </div>
        </div>
      </div>`).join('')}
    <button class="btn-primary" onclick="finishOnboarding()">${t('setupBtn')} →</button>
  </div>`;
}

function finishOnboarding(){
  const sc={};
  DOGS.forEach((dog,di)=>{
    const meals=document.getElementById(`ob-meals-${di}`)?.value;
    const groomN=document.getElementById(`ob-groom-n-${di}`)?.value;
    const groomU=document.getElementById(`ob-groom-u-${di}`)?.value;
    const analN=document.getElementById(`ob-anal-n-${di}`)?.value;
    const analU=document.getElementById(`ob-anal-u-${di}`)?.value;
    sc[di]={
      meals:parseInt(meals)||2,
      groomFreqN:groomN,groomFreqUnit:groomU,
      groomFreqDays:groomN&&groomU?parseInt(groomN)*parseInt(groomU):null,
      analFreqN:analN,analFreqUnit:analU,
      analFreqDays:analN&&analU?parseInt(analN)*parseInt(analU):null
    };
  });
  S.schedule=sc;
  localStorage.setItem('pawpack_schedule',JSON.stringify(sc));
  document.getElementById('onboard-screen').style.display='none';
  document.getElementById('app').style.display='block';
  renderAll();
}

// ---- NAVIGATION ----
function showView(v){
  S.view=v;S.dogView=null;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const navEl=document.getElementById('nav-'+v);
  if(navEl)navEl.classList.add('active');
  renderAll();
}
function openDog(i){S.dogView=i;S.dogTab='overview';renderAll()}
function closeDog(){S.dogView=null;renderAll()}
function setDogTab(tab){S.dogTab=tab;renderAll()}

function renderAll(){
  const mc=document.getElementById('main-content');
  if(!mc)return;
  if(S.dogView!==null){
    mc.innerHTML=renderDogProfile(S.dogView);
    return;
  }
  if(S.view==='home')mc.innerHTML=renderHome();
  else if(S.view==='dogs')mc.innerHTML=renderDogsList();
  else if(S.view==='calendar')mc.innerHTML=renderCalendar();
  else if(S.view==='settings')mc.innerHTML=renderSettings();
}

// ---- MODALS ----
function buildBody(type,ex){
  const d=ex?ex.data:{};
  const dogs=ex?ex.dogs:[S.dogView!==null?S.dogView:0];
  S.modalDogs=[...dogs];
  const dp=DOGS.map((dog,i)=>`<div class="dog-pick${S.modalDogs.includes(i)?' picked':''}" id="dp-${i}" onclick="togDog(${i})">${dog.name}</div>`).join('');
  const ds=`<label>${t('dogLabel')}</label><div class="dog-pick-grid">${dp}</div>`;
  const groomOpts=['Bath','Anal glands','Nail trim','Brush','Other'].map((o,i)=>{
    const labels=[t('bath'),t('analGlands'),t('nailTrim'),t('brush'),t('other')];
    return`<option value="${o}"${d.groom_type===o?' selected':''}>${labels[i]}</option>`;
  }).join('');
  const freqOpts=[['1xday',t('oncedaily')],['2xday',t('twicedaily')],['3xday',t('3xdaily')],['4xday',t('4xdaily')],['every_other',t('everyother')],['weekly',t('weekly')],['as_needed',t('asneeded')]].map(([v,l])=>`<option value="${v}"${d.frequency===v?' selected':''}>${l}</option>`).join('');

  if(type==='feed')return ds+`
    <label>${t('amountLabel')}</label><input id="mf-amount" type="text" value="${d.amount||''}" placeholder="e.g. 1 cup kibble">
    <label>${t('notesLabel')}</label><textarea id="mf-notes" placeholder="">${d.notes||''}</textarea>`;
  if(type==='med')return ds+`
    <label>${t('medName')}</label><input id="mf-med_name" type="text" value="${d.med_name||''}">
    <label>${t('dose')}</label><input id="mf-dose" type="text" value="${d.dose||''}" placeholder="e.g. 1 drop">
    <label>${t('frequency')}</label><select id="mf-frequency"><option value="">${t('selectFreq')}</option>${freqOpts}</select>
    <div class="freq-row" style="margin-top:12px">
      <div><label style="margin-top:0">${t('startDate')}</label><input id="mf-start_date" type="date" value="${d.start_date||todayISO()}"></div>
      <div><label style="margin-top:0">${t('durationDays')}</label><input id="mf-duration_days" type="number" min="1" value="${d.duration_days||''}" placeholder="7"></div>
    </div>
    <label>${t('notesLabel')}</label><textarea id="mf-notes">${d.notes||''}</textarea>`;
  if(type==='groom')return ds+`
    <label>${t('groomType')}</label><select id="mf-groom_type"><option value="">${t('selectType')}</option>${groomOpts}</select>
    <label>${t('notesLabel')}</label><textarea id="mf-notes">${d.notes||''}</textarea>`;
  if(type==='vet')return ds+`
    <label>${t('visitDate')}</label><input id="mf-visit_date" type="date" value="${d.visit_date||todayISO()}">
    <label>${t('reason')}</label><input id="mf-reason" type="text" value="${d.reason||''}">
    <label>${t('vetName')}</label><input id="mf-vet_name" type="text" value="${d.vet_name||''}">
    <label>${t('notesLabel')}</label><textarea id="mf-notes">${d.notes||''}</textarea>`;
  return ds;
}

function openModal(type,editId){
  let ex=null;
  if(editId!==null&&editId!==undefined){
    ex=S.entries.find(e=>e.id===editId);
    if(!ex)return;
    type=ex.type;
  }
  S.modalType=type;S.editId=editId??null;
  const titleKey=S.editId!==null?`edit${type.charAt(0).toUpperCase()+type.slice(1)}`:`add${type.charAt(0).toUpperCase()+type.slice(1)}`;
  document.getElementById('modal-title').textContent=t(titleKey);
  document.getElementById('modal-body').innerHTML=buildBody(type,ex);
  document.getElementById('modal').style.display='flex';
}
function togDog(i){
  const idx=S.modalDogs.indexOf(i);
  if(idx>-1){if(S.modalDogs.length>1)S.modalDogs.splice(idx,1);}
  else S.modalDogs.push(i);
  DOGS.forEach((_,j)=>{const el=document.getElementById('dp-'+j);if(el)el.classList.toggle('picked',S.modalDogs.includes(j));});
}
function closeModal(){document.getElementById('modal').style.display='none';S.editId=null}

async function saveEntry(){
  const type=S.modalType;
  const data={};
  (FIELDS[type]||[]).forEach(f=>{const el=document.getElementById('mf-'+f);if(el)data[f]=el.value;});
  closeModal();

  if(S.editId!==null){
    // If it's a group entry being edited, split into individual entries
    const orig=S.entries.find(e=>e.id===S.editId);
    if(orig&&orig.dogs.length>1&&S.modalDogs.length===1){
      // Editing one dog's copy — update just that dog
      const idx=S.entries.findIndex(e=>e.id===S.editId);
      if(idx>-1){S.entries[idx].data=data;S.entries[idx].dogs=[...S.modalDogs];await updateEntry(S.entries[idx]);}
    } else {
      const idx=S.entries.findIndex(e=>e.id===S.editId);
      if(idx>-1){S.entries[idx].data=data;S.entries[idx].dogs=[...S.modalDogs];await updateEntry(S.entries[idx]);}
    }
  } else {
    // Split into individual entries per dog
    for(const di of S.modalDogs){
      const entry={id:Date.now()+di,type,dogs:[di],ts:new Date().toISOString(),data:{...data}};
      S.entries.unshift(entry);
      await pushEntry(entry);
    }
  }
  localStorage.setItem('pawpack_entries',JSON.stringify(S.entries));
  renderAll();
}

function askDel(id){S.pendingDel=id;document.getElementById('confirm').style.display='flex'}
function closeConfirm(){S.pendingDel=null;document.getElementById('confirm').style.display='none'}
async function confirmDelete(){
  const id=S.pendingDel;
  S.entries=S.entries.filter(e=>e.id!==id);
  closeConfirm();
  localStorage.setItem('pawpack_entries',JSON.stringify(S.entries));
  await deleteEntryDB(id);
  renderAll();
}

// ---- INIT ----
document.getElementById('lang-btn').textContent=lang==='en'?'ES':'EN';
(async()=>{
  await loadFromSupabase();
  document.getElementById('loading').style.display='none';
  if(!S.schedule){
    renderOnboarding();
  } else {
    document.getElementById('app').style.display='block';
    renderAll();
  }
})();
</script>
